# Fichier à créer dans GitHub à ce chemin exact :
# .github/workflows/run_dashboard.yml
#
# Ce fichier fait tourner le script Python automatiquement
# toutes les heures, sans serveur, gratuitement.

name: Générer Dashboard SSSE

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
    # exemples alternatifs :
    # '0 6 * * *'          # tous les jours à 6h00
    # '0 6 * * 1-5'        # du lundi au vendredi à 6h00
  workflow_dispatch:       # permet aussi de lancer manuellement depuis GitHub

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install \
            office365-rest-python-client \
            pandas \
            openpyxl \
            plotly \
            jinja2 \
            python-dotenv

      - name: Lancer le script
        env:
          SP_URL:      ${{ secrets.SP_URL }}
          SP_USER:     ${{ secrets.SP_USER }}
          SP_PASSWORD: ${{ secrets.SP_PASSWORD }}
          EXCEL_PATH:  ${{ secrets.EXCEL_PATH }}
          SHEET_NAME:  Semoule SSSE
        run: python generate_dashboard_ssse.py
